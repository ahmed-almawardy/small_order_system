services:
  backend:
    build:
        context: .
        dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_started
      broker:
        condition: service_started

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: 'on-failure'

  db:
    image: postgres:16-alpine
    env_file: '.env'
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: 'on-failure'

  broker:
    image: rabbitmq:3-management
    depends_on:
      db:
        condition: service_started
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: 'on-failure'

volumes:
    pgdata: